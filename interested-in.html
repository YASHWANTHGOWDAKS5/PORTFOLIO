<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Am Interested In</title>
    <style>
        /* General body and layout styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            overflow-x: hidden;
        }

        .background-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 50px 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: fadeInLogo 1.5s ease-in-out;
        }

        h1, p {
            margin: 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        .button {
            color: white;
            text-decoration: none;
            background-color: black;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }

        .button:hover {
            background-color: white;
            color: black;
            border: 2px solid black;
        }

        @keyframes fadeInLogo {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- Background Section -->
    <div class="background-section">
        <canvas id="background"></canvas>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="logo-container">
            <img src="yashu25.jpg" alt="Logo" class="logo">
            <h1>I Am Interested In</h1>
            <p>Here are some areas I am passionate about:</p>
            <ul>
                <li>
                    <h3>Building applications using Dart; I am proud to say I am very good at coding.</h3>
                </li>
                <li>
                    <h3>Web development and building interactive websites (Dynamic/Static).</h3>
                </li>
                <li>
                    <h3>
                        I am very much Interested in Astronomy: 
                        <a href="astro.html" class="button">Click to Know More</a>
                    </h3>
                </li>
            </ul>
            <a href="hello.html" class="button">Back to Home</a>
        </div>
    </div>

    <!-- Background Animation Script -->
    <script>
        const canvas = document.getElementById('background');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const dots = [];
        const maxDots = 100;

        function createDot() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 1,
                dx: Math.random() * 1 - 0.5,
                dy: Math.random() * 1 - 0.5
            };
        }

        function drawDot(dot) {
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
        }

        function updateDot(dot) {
            dot.x += dot.dx;
            dot.y += dot.dy;

            if (dot.x < 0 || dot.x > canvas.width) dot.dx *= -1;
            if (dot.y < 0 || dot.y > canvas.height) dot.dy *= -1;
        }

        function connectDots(dot, mouseX, mouseY) {
            const distance = Math.hypot(dot.x - mouseX, dot.y - mouseY);
            if (distance < 100) {
                ctx.beginPath();
                ctx.moveTo(dot.x, dot.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        function animate(mouseX, mouseY) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            dots.forEach(dot => {
                drawDot(dot);
                updateDot(dot);
                if (mouseX !== null && mouseY !== null) {
                    connectDots(dot, mouseX, mouseY);
                }
            });

            requestAnimationFrame(() => animate(mouseX, mouseY));
        }

        let mouseX = null;
        let mouseY = null;

        canvas.addEventListener('mousemove', (event) => {
            mouseX = event.clientX;
            mouseY = event.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = null;
            mouseY = null;
        });

        // Initialize dots
        for (let i = 0; i < maxDots; i++) {
            dots.push(createDot());
        }

        animate();
    </script>
</body>
</html>
