<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Works</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: #fff;
            background: linear-gradient(to bottom right, #1f3c73, #2e5396, #6a8dff); /* New gradient color scheme */
            overflow-x: hidden;
        }

        /* Background Section */
        .background-section {
            position: relative;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .logo-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px;
        }

        .logo {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            color: #fff;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .button {
            padding: 15px 30px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s, transform 0.3s;
        }

        .button:hover {
            background: black;
            color: white;
            transform: translateY(-3px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #121212;
            color: #bbb;
            font-size: 0.9rem;
        }

        /* For Particle Animation */
        .typing-container77 {
            width: fit-content;
            border-right: 2px solid black; /* Cursor effect */
            white-space: nowrap; /* Prevents wrapping */
            overflow: hidden; /* Hides overflowing text for the effect */
            font-family: monospace; /* Typewriter-like font */
            font-size: 1.5rem;
        }

        /* Typing animation */
        .typing-text8 {
            display: inline-block;
            animation: typing 4s steps(22, end), blink 0.5s step-end infinite alternate;
        }

        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 22ch;
            }
        }

        @keyframes blink {
            from {
                border-right-color: black;
            }
            to {
                border-right-color: transparent;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .button {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Section with Interactive Canvas -->
    <div class="background-section">
        <canvas id="interactiveCanvas"></canvas>
        <div class="logo-container">
            <img src="yashu25.jpg" alt="Logo" class="logo">
            <div class="typing-container77">Yashwanth <span class="co2">Gowda</span> KS</div>
        </div>
    </div>

    <!-- Button Container -->
    <div class="button-container">
        <a href="my-works.html" class="button">My Works</a>
        <a href="interested-in.html" class="button">I Am Interested In</a>
        <a href="mastered-in.html" class="button">Mastered In</a>
        <a href="achievements.html" class="button">Achievements</a>
        <a href="profile.html" class="button">Profiles & Contact</a>
    </div>

    <!-- Footer -->
    <footer>
        © 2024 Yashwanth Gowda KS. All rights reserved.
    </footer>

    <script>
        // JavaScript for Interactive Canvas
        const canvas = document.getElementById('interactiveCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 3;
                this.xSpeed = Math.random() * 2 - 1;
                this.ySpeed = Math.random() * 2 - 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                if (this.x < 0 || this.x > canvas.width) this.xSpeed *= -1;
                if (this.y < 0 || this.y > canvas.height) this.ySpeed *= -1;
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle) => {
                particle.update();
                particle.draw();
            });

            connectParticles();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
