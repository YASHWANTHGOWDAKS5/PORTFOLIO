<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links with Photo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #0b0033, #000011) fixed;
      color: #fff;
      overflow: hidden; /* Prevent scrolling to ensure focus on the design */
    }

    /* Galaxy Background Animation */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('galaxy.jpg') center/cover no-repeat;
      opacity: 0.2;
      z-index: -1;
      animation: galaxyMove 30s infinite linear;
    }

    @keyframes galaxyMove {
      from {
        background-position: 0 0;
      }
      to {
        background-position: -1000px -1000px;
      }
    }

    /* Social Icons Container */
    .social-icons {
      position: fixed;
      top: 10%;
      right: 5%;
      display: flex;
      flex-direction: column;
      gap: 30px;
      animation: fadeIn 2s ease-in-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .social-icons a,
    .social-icons span {
      color: #fff;
      text-decoration: none;
      font-size: 2.5rem;
      padding: 15px;
      border: 2px solid #fff;
      border-radius: 50%;
      text-align: center;
      transition: all 0.3s ease;
      display: inline-block;
      width: 70px;
      height: 70px;
    }

    .social-icons a:hover,
    .social-icons span:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffcc00;
      transform: scale(1.1);
    }

    /* Email Tooltip */
    .email-tooltip {
      display: none;
      background-color: #222;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      position: absolute;
      top: 90px;
      right: 0;
      font-size: 1rem;
      box-shadow: 0 2px 6px rgba(255, 255, 255, 0.2);
      white-space: nowrap;
      z-index: 10;
    }

    .email-tooltip::before {
      content: '';
      position: absolute;
      top: -8px;
      right: 20px;
      border: 4px solid transparent;
      border-bottom-color: #222;
    }

    /* Show Tooltip on Hover */
    .email:hover + .email-tooltip {
      display: block;
    }

    /* Photo Container */
    .photo-container {
      position: fixed;
      top: 20%;
      left: 15%;
      max-width: 1000px;
      animation: slideInLeft 4s ease-in-out forwards;
      opacity: 0;
    }

    @keyframes slideInLeft {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .photo-container img {
      width: 155%;
      border-radius: 15px;
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <!-- Social Icons -->
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/yashwanth-gowda-k-s-8067542b2?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank" title="LinkedIn">
      <i class="fab fa-linkedin"></i>
    </a>
    <a href="https://github.com/YASHWANTHGOWDAKS5" target="_blank" title="GitHub">
      <i class="fab fa-github"></i>
    </a>
    <span class="email" title="Email">
      <i class="fas fa-envelope"></i>
    </span>
    <div class="email-tooltip">yashwanthgowdaksyashugowda@gmail.com</div>
  </div>

  <!-- Photo Section -->
  <div class="photo-container">
    <img src="q.jpg" alt="intersteller quote">
  </div>
</body>
</html>
