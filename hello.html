<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Yashwanth Gowda KS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .co2 {
            color: #FF8C00;
        }

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: #fff;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            overflow-x: hidden;
        }

        /* Background Section */
        .background-section {
            position: relative;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .logo-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px;
        }

        .logo {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Description Section */
        .description-section {
            padding: 60px 20px;
            text-align: center;
            line-height: 1.8;
        }

        .intro-text,
        .second-text {
            max-width: 800px;
            margin: 10px auto 20px auto;
            color: #ddd;
        }

        .intro-text {
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .second-text {
            font-size: 1.1rem;
            color: #bbb;
        }

        /* Button Container */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            color: black;
            text-decoration: none;
            background: white;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.4s ease-in-out;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .button:hover {
            color: white;
            background: black;
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
        }

            content: '';
            position: absolute;
            top: 0;
            left: -100%;
